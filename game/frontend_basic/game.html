<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Socket Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <h1>Game Socket Test</h1>

  <script type="module">
    import { connectAuthenticatedSocket } from "./socketAuth.js";

    const socket = connectAuthenticatedSocket({
      url: window.location.origin + "/game",
      options: {
        path: "/socket.io/",
      },
      onAuthenticated: (socket) => {
        console.log("Ready to play as socket:", socket.id);
      },
      onUnauthorized: () => {
        window.location.href = "index.html";
      },
    });
  </script>
</body>
</html>
