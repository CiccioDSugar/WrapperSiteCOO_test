<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
</head>
<body>
  <h1>Dashboard</h1>

  <button onclick="location.href='game.html'">Go to Game</button>
  <button onclick="location.href='profile.html'">Go to Profile</button>
  <button id="logoutBtn">Logout</button>
  <p></p>
  <button id="enable2faBtn">Enable 2FA</button>
  <button id="disable2faBtn">Disable 2FA</button>
  <p></p>
  <div id="qrContainer"></div>
  <input id="totpInput" placeholder="123456" />
  <button id="confirm2faBtn">Confirm 2FA</button>

  <script type="module">
    import { fetchWithAuthRetry } from './authFetch.js';

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetchWithAuthRetry("/api/protected");
        console.log("Status:", res?.status);
        console.log("Content-Type:", res?.headers.get("content-type"));
        // const text = await res.text();
        //console.log("Raw response:", text);
        if (!res) return;

        const json = await res.json();
        console.log("Logged in user:", json.user);
      } catch {
        window.location.href = "index.html";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await fetch("/api/auth/logout", {
        method: "POST",
        credentials: "include",
      });
      window.location.href = "index.html";
    });

      document.getElementById("enable2faBtn").onclick = async () => {
    const res = await fetch("/api/auth/2fa/setup", {
      method: "POST",
      credentials: "include",
    });

    const data = await res.json();
    document.getElementById("qrContainer").innerHTML =
      `<img src="${data.qrCode}" />`;
  };

  document.getElementById("confirm2faBtn").onclick = async () => {
    const code = document.getElementById("totpInput").value;

    await fetch("/api/auth/2fa/enable", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });

    alert("2FA enabled!");
  };

  document.getElementById("disable2faBtn").onclick = async () => {
    await fetch("/api/auth/2fa/disable", {
      method: "POST",
      credentials: "include",
    });

    alert("2FA disabled");
  };
  </script>
</body>
</html>
