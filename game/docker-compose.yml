services:
  db:
    image: postgres:15-alpine
    container_name: game_db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    container_name: auth_service
    env_file:
      - ./auth-service/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  profile-service:
    build:
      context: .
      dockerfile: ./profile-service/Dockerfile
    container_name: profile_service
    env_file:
      - .env
    depends_on:
      - auth-service
    networks:
      - backend

  game-service:
    build:
      context: .
      dockerfile: ./game-service/Dockerfile
    container_name: game_service
    env_file:
      - .env
    depends_on:
      - auth-service
    networks:
      - backend

  gateway:
    image: nginx:stable-alpine
    container_name: api_gateway
    ports:
      - "2443:2443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs
    depends_on:
      - auth-service
      - profile-service
      - game-service
    networks:
      - backend

  ngrok:
    image: ngrok/ngrok:3
    container_name: ngrok
    command:  http https://gateway:2443
    env_file:
      - .env
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - gateway
    ports:
      - "4040:4040"
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge